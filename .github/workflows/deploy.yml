name: Deploy to GitHub Pages

# When to run: on every push to main, a manual button, and whenever the Google
# Sheet fires a repository_dispatch (event type "sheet-updated") via Apps Script.
on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [sheet-updated]

# Permissions the deploy needs (least-privilege)
permissions:
  contents: read      # to checkout your code
  pages: write        # to publish to Pages
  id-token: write     # to prove the deploy came from this workflow (OIDC)

# Don't let two deploys race each other
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4            # clone your repo onto the runner

      - uses: actions/setup-node@v4          # install Node
        with:
          node-version: 20
          cache: npm                         # cache ~/.npm between runs (needs package-lock.json)

      - run: npm ci                          # clean install from package-lock.json

      - name: Sync sheet content into Supabase
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          # Push the premium lines into the RLS-gated `content` table. The
          # service-role key bypasses RLS and must stay server-side (CI only).
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/fetch-sheet.mjs

      - name: Build static site
        env:
          # Public Supabase config — embedded into the client bundle at build.
          # Safe to expose (anon key is RLS-protected). Set these as repo secrets.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build                   # produces ./out because output:"export"

      - uses: actions/upload-pages-artifact@v3   # package ./out as the Pages artifact
        with:
          path: ./out

  deploy:
    needs: build                             # only run after build succeeds
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}   # shows the live URL in the UI
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4        # takes the artifact and publishes it