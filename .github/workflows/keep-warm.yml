name: Keep Supabase warm

# Supabase free-tier projects pause after ~7 days of inactivity. This hits the
# REST API once a day so the project never idles long enough to pause (which
# would break logins, content, and — most importantly — Stripe webhooks).
on:
  schedule:
    - cron: "23 7 * * *" # daily at 07:23 UTC (offset minute to avoid skipped runs)
  workflow_dispatch: # lets you run it manually from the Actions tab

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          curl -fsS "$SUPABASE_URL/rest/v1/content?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -o /dev/null -w "Supabase ping OK: HTTP %{http_code}\n"
